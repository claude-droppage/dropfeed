name: biweekly-reconcile

# Co ~2 tygodnie: sprawdzenie żywotności reklam (is_active) + snapshot osi skalowania.
on:
  schedule:
    - cron: '0 5 1,15 * *' # 05:00 UTC, 1. i 15. dnia miesiąca (~co 2 tyg.)
  workflow_dispatch: {}

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Reconcile is_active + snapshot osi skalowania
        run: npm run reconcile
